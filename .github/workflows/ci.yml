name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tests:
    name: backend tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e "./backend[dev]"
      - name: Test
        working-directory: backend
        run: pytest -q

  frontend-sync:
    name: frontend shell is in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build the bundled shell
        working-directory: frontend
        run: npm run build
      - name: Fail if the committed shell is stale
        run: |
          if ! git diff --quiet -- backend/dbt_debug/web/index.html; then
            echo "::error::backend/dbt_debug/web/index.html is out of date."
            echo "Run 'npm run build' in frontend/ and commit the result."
            git diff --stat -- backend/dbt_debug/web/index.html
            exit 1
          fi
