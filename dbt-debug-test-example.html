<script>(function(){

function escapeHtml(s){
  return (s==null ? '' : String(s)).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

const raw = s => ({__html: s==null ? '' : String(s)});

function frag(v){
  if(v==null || v===false || v===true) return '';
  if(Array.isArray(v)) return v.map(frag).join('');
  if(typeof v==='object' && v.__html!=null) return v.__html;
  return escapeHtml(String(v));
}

function html(strings, ...vals){
  let out='';
  strings.forEach((s,i)=>{ out += s + (i<vals.length ? frag(vals[i]) : ''); });
  return {__html: out};
}

function setHTML(el, tmpl){
  el.innerHTML = tmpl && tmpl.__html!=null ? tmpl.__html : frag(tmpl);
}

const plural = (n,w) => n+' '+w+(n===1 ? '' : 's');

const humanTest = t =>

function testLabel(t, modelName){
  const nm = t.name||'';
  const pre = (t.test_type||'')+'_'+modelName+'_';
  let col = nm.indexOf(pre)===0 ? nm.slice(pre.length) : nm;
  col = col.replace(/__.*$/,'');
  return humanTest(t.test_type) + (col && col!==nm ? ' · '+col : '');
}

function relTime(iso){
  if(!iso) return '';
  const t = Date.parse(iso);
  if(isNaN(t)) return '';
  const s = (Date.now()-t)/1000;
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function fmtTime(iso){
  if(!iso) return '';
  const d = new Date(iso);
  if(isNaN(d.getTime())) return '';
  const p = x => String(x).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}

const STATUS = {
  passed:   {node:'n-ok',      icon:'✓', color:'#3ecf8e', badge:['SUCCESS','b-pass']},
  failed:   {node:'n-root',    icon:'✕', color:'#f2555a', badge:['FAILED','b-fail']},
  testfail: {node:'n-root',    icon:'✕', color:'#f2555a', badge:['TEST FAILED','b-fail']},
  skipped:  {node:'n-cas',     icon:'⊘', color:'#f0a24e', badge:['SKIPPED','b-warn']},
  stale:    {node:'n-stale',   icon:'⧗', color:'#e8b34a', badge:['STALE','b-warn']},
  warn:     {node:'n-stale',   icon:'⧗', color:'#e8b34a', badge:['WARNING','b-warn']},
  source:   {node:'n-src',     icon:'◦', color:'#8aa6e0', badge:['SOURCE','b-neutral']},

function nodeState(n, isTestRun){
  if(n.resource_type==='source')
    return (n.freshness_status==='warn'||n.freshness_status==='error') ? 'stale' : 'source';
  if(isTestRun){
    if(n.test_status==='fail'||n.test_status==='error') return 'testfail';

  if(n.status==='error') return 'failed';
  if(n.failure_class==='casualty'||n.failure_class==='skipped') return 'skipped';
  if(n.test_status==='fail'||n.test_status==='error') return 'testfail';
  if(n.test_status==='warn') return 'warn';
  if(n.status==='success'||n.failure_class==='ok') return 'passed';
  return 'neutral';
}

function badgeState(n){

    return (n.freshness_status==='warn'||n.freshness_status==='error') ? 'stale' : 'source';

class GraphModel {
  constructor(graph){
    this.graph = graph;
    this.isTestRun = graph.command === 'test';

    this.byId = {};
    graph.nodes.forEach(n => this.byId[n.id] = n);

    this.childrenOf = {};
    graph.edges.forEach(e => { (this.childrenOf[e.source] = this.childrenOf[e.source] || []).push(e.target); });

    this.rootCauses = graph.nodes.filter(n => n.failure_class==='root_cause').map(n => n.id);

    this.blastOf = {};
    graph.nodes.forEach(n => {
      if(n.blamed_root_cause && n.failure_class==='casualty')
        this.blastOf[n.blamed_root_cause] = (this.blastOf[n.blamed_root_cause]||0) + 1;
    });

    this.pos = {};
    this.width = 0;
    this.height = 0;
    this.cascade = new Set();

    this._computeCascade();
    this._layout();
  }

  blast(id){ return this.blastOf[id] || 0; }

  _computeCascade(){
    const seeds = this.isTestRun
      ? this.graph.nodes.filter(n => n.test_status==='fail'||n.test_status==='error').map(n => n.id)
      : this.rootCauses;
    const stack = [...seeds];
    seeds.forEach(r => this.cascade.add(r));
    while(stack.length){
      const u = stack.pop();
      (this.childrenOf[u] || []).forEach(v => {
        if(this.cascade.has(v)) return;
        const nv = this.byId[v];
        if(!nv) return;
        const follow = this.isTestRun ? true : (nv.failure_class==='casualty'||nv.failure_class==='skipped');
        if(follow){ this.cascade.add(v); stack.push(v); }
      });
    }
  }

  _layout(){
    const lanes = {};
    this.graph.nodes.forEach(n => { (lanes[n.lane] = lanes[n.lane] || []).push(n); });
    Object.values(lanes).forEach(arr => arr.sort((a,b) =>
      (a.resource_type<b.resource_type ? -1 : a.resource_type>b.resource_type ? 1 : a.name.localeCompare(b.name))));
    let maxRows = 0, maxLane = 0;
    Object.keys(lanes).forEach(l => {
      lanes[l].forEach((n,i) => this.pos[n.id] = {x: LANE_X(+l), y: TOP + i*ROW});
      maxRows = Math.max(maxRows, lanes[l].length);
      maxLane = Math.max(maxLane, +l);
    });
    this.width = LANE_X(maxLane) + NODE_W + 40;
    this.height = TOP + maxRows*ROW + 30;
  }
}

class Viewport {
  constructor(model){
    this.model = model;
    this.canvas = document.getElementById('canvas');
    this.wrap = document.getElementById('canvaswrap');
    this.zoom = 1;
    this.panX = 0;
    this.panY = 0;
    this._setup();
  }

  apply(){
    this.canvas.style.transform = 'translate('+this.panX+'px,'+this.panY+'px) scale('+this.zoom+')';
    document.getElementById('zoomReset').textContent = Math.round(this.zoom*100)+'%';
  }

  zoomTo(z, ox, oy){
    z = Math.max(ZMIN, Math.min(ZMAX, z));
    const r = this.wrap.getBoundingClientRect();
    if(ox==null){ ox = r.width/2; oy = r.height/2; }
    const cx = (ox-this.panX)/this.zoom, cy = (oy-this.panY)/this.zoom;
    this.zoom = z;
    this.panX = ox - cx*this.zoom;
    this.panY = oy - cy*this.zoom;
    this.apply();
  }

  panToNode(id){
    const p = this.model.pos[id];
    if(!p) return;
    const r = this.wrap.getBoundingClientRect();
    const PAD = 32, usable = Math.max(240, r.width-320);
    const contentW = this.model.width*this.zoom, contentH = this.model.height*this.zoom;
    let px = usable/2 - (p.x+NODE_W/2)*this.zoom;
    px = contentW<=usable-PAD ? PAD : Math.max(usable-PAD-contentW, Math.min(PAD, px));
    let py = r.height/2 - (p.y+NODE_H/2)*this.zoom;
    py = contentH<=r.height-PAD ? PAD : Math.max(r.height-PAD-contentH, Math.min(PAD, py));
    this.panX = px;
    this.panY = py;
    this.apply();
  }

  _setup(){
    const self = this, wrap = this.wrap;
    wrap.addEventListener('wheel', e => {
      e.preventDefault();
      const r = wrap.getBoundingClientRect();
      self.zoomTo(self.zoom*Math.exp(-e.deltaY*0.002), e.clientX-r.left, e.clientY-r.top);
    }, {passive:false});
    document.getElementById('zoomIn').onclick = () => self.zoomTo(self.zoom*1.2);
    document.getElementById('zoomOut').onclick = () => self.zoomTo(self.zoom/1.2);
    document.getElementById('zoomReset').onclick = () => self.zoomTo(1);

    const PAN_SPEED = 0.6;
    let sx=0, sy=0, spx=0, spy=0, down=false, dragged=false;
    wrap.addEventListener('pointerdown', e => {
      if(e.button!==0) return;
      down = true; dragged = false;
      sx = e.clientX; sy = e.clientY; spx = self.panX; spy = self.panY;
    });
    window.addEventListener('pointermove', e => {
      if(!down) return;
      const dx = e.clientX-sx, dy = e.clientY-sy;
      if(!dragged && Math.hypot(dx,dy) < 4) return;
      dragged = true; wrap.classList.add('panning');
      self.panX = spx + dx*PAN_SPEED;
      self.panY = spy + dy*PAN_SPEED;
      self.apply();
      e.preventDefault();
    });
    window.addEventListener('pointerup', () => { down = false; wrap.classList.remove('panning'); });
    wrap.addEventListener('click', e => { if(dragged){ e.stopPropagation(); dragged = false; } }, true);
  }
}

        path.setAttribute('stroke-width','2.6');
        path.setAttribute('filter','url(#glow)');
      } else if(intoFail){
        path.setAttribute('stroke','rgba(242,85,90,0.5)');
        path.setAttribute('stroke-width','1.6');
      } else {
        path.setAttribute('stroke','rgba(255,255,255,0.09)');
        path.setAttribute('stroke-width','1.4');
      }
      this.svg.appendChild(path);
    });
  }

  highlight(id){
    Object.values(this.nodeEls).forEach(e => e.classList.remove('sel'));
    if(this.nodeEls[id]) this.nodeEls[id].classList.add('sel');
  }

  clearHighlight(){
    Object.values(this.nodeEls).forEach(e => e.classList.remove('sel'));
  }

  setPathOnly(on){
    this.hidden = new Set();
    if(on){
      this.model.graph.nodes.forEach(n => {
        if(this.model.cascade.has(n.id)) return;
        const keep = (this.model.childrenOf[n.id] || []).some(c => this.model.cascade.has(c)) && n.resource_type==='source';
        if(!keep) this.hidden.add(n.id);
      });
    }
    this.model.graph.nodes.forEach(n => this.nodeEls[n.id].style.display = this.hidden.has(n.id) ? 'none' : 'flex');
    this.drawEdges();
  }
}

class Sidebar {
  constructor(model, onItemClick){
    this.model = model;
    this.el = document.getElementById('side');
    this._build();
    this.el.addEventListener('click', e => {
      const item = e.target.closest('[data-id]');
      if(item) onItemClick(item.dataset.id);
    });
  }

  _item(id, nm, sub, cls){
    return html`<div class="fail-item ${raw(cls||'')}" data-id="${id}"><div class="nm">${nm}</div><div class="sub">${sub}</div></div>`;
  }

  _testSection(parts, title, pred, cls){
    const groups = [];
    this.model.graph.nodes.forEach(n => {
      if(n.status==='error') return;  // an errored model is listed under Model failures, not here
      const tests = (n.tests||[]).filter(pred);
      if(tests.length) groups.push({node:n, tests});
    });
    if(!groups.length) return;
    parts.push(html`<div class="side-h" style="margin-top:14px">${title}</div>`);
    groups.forEach(({node, tests}) => {
      if(tests.length === 1){
        parts.push(this._item(node.id, testLabel(tests[0], node.name), node.name+' · '+(tests[0].failures||0)+' rows', cls));
      } else {
        const rows = tests.reduce((s,t) => s + (t.failures||0), 0);
        parts.push(this._item(node.id, node.name, plural(tests.length,'test')+' · '+rows+' rows', cls));
      }
    });
  }

  _build(){
    const g = this.model.graph, parts = [];

    const modelFails = g.nodes.filter(n => n.resource_type==='model' && n.status==='error');
    if(modelFails.length){
      parts.push(html`<div class="side-h">Model failures</div>`);
      modelFails.forEach(n => parts.push(this._item(n.id, n.name, 'errored · skipped '+this.model.blast(n.id)+' downstream')));
    }

    this._testSection(parts, 'Failed tests', t => t.status==='fail'||t.status==='error');
    this._testSection(parts, 'Test warnings', t => t.status==='warn', 'warnish');

    const stale = g.nodes.filter(n => n.resource_type==='source' && (n.freshness_status==='warn'||n.freshness_status==='error'));
    if(stale.length){
      parts.push(html`<div class="side-h" style="margin-top:14px">Stale sources</div>`);
      stale.forEach(n => parts.push(this._item(n.id, n.name, n.freshness_status+' · '+Math.round((n.freshness_age_seconds||0)/3600)+'h old', 'warnish')));
    }

    setHTML(this.el, parts.length ? html`${parts}` : html`<div class="hsub">No failures — all green.</div>`);
  }
}

class Drawer {
  constructor(model, onClose){
    this.model = model;
    this.el = document.getElementById('drawer');
    this.el.addEventListener('click', e => { if(e.target.closest('.x')) onClose(); });
  }

  select(n){
    this.el.classList.add('open');
    setHTML(this.el, this._html(n));
  }

  close(){ this.el.classList.remove('open'); }

  _cols(n){
    if(!n.columns || !n.columns.length) return '';
    return html`<div class="cols-h"><span>Columns</span><span>${n.columns.length}</span></div>${
      n.columns.map(c => html`<div class="col-row"><span class="cname">${c.name}</span><span class="ctype">${c.data_type||''}</span></div>`)}`;
  }

  _source(n){
    return html`<div class="block ${raw(n.freshness_status==='pass' ? '' : 'block-cas')}"><div class="block-lbl" style="color:#e8b34a">Freshness</div>
        <div style="font-size:11px;color:#c3c6cd">${(n.freshness_status||'unknown')} · loaded ~${Math.round((n.freshness_age_seconds||0)/3600)}h ago</div></div>${this._cols(n)}`;
  }

  _success(n){
    const rel = relTime(n.completed_at), ts = fmtTime(n.completed_at);
    return html`<div class="block block-ok"><div class="built">
        <div><div class="block-lbl" style="color:#3ecf8e">● Last built</div>${rel ? html`<div class="when">${rel}</div>` : ''}</div>${ts ? html`<div class="ts">${ts}</div>` : ''}</div></div>
      <div class="tiles">
        <div class="tile"><div class="k">Materialization</div><div class="v">${n.materialization||'—'}</div></div>
        <div class="tile"><div class="k">Exec time</div><div class="v">${n.execution_time!=null ? n.execution_time.toFixed(2)+'s' : '—'}</div></div>
      </div>${this._cols(n)}`;
  }

  _failure(n){
    const parts = [];
    if(n.status==='error' && n.message)
      parts.push(html`<div class="block block-err"><div class="block-lbl" style="color:#f2555a">Compilation error</div><pre>${n.message}</pre></div>`);
    if(n.status==='error')
      parts.push(html`<div class="block block-root"><div class="block-lbl" style="color:#ff9d7a">Root cause <span class="badge" style="background:rgba(255,157,122,0.16);color:#ff9d7a">computed</span></div>
        <div style="font-size:11px;color:#c3c6cd">This model ran and errored — its parents were fine, so it's the origin of the failure. Skipped ${this.model.blast(n.id)} downstream model(s).</div></div>`);
    else if(n.failure_class==='casualty')
      parts.push(html`<div class="block block-cas"><div class="block-lbl" style="color:#f0a24e">Casualty</div>
        <div style="font-size:11px;color:#c3c6cd">Skipped because <span class="mono">${(this.model.byId[n.blamed_root_cause]||{}).name || n.blamed_root_cause}</span> upstream failed.</div></div>`);
    else if(n.test_status==='fail'||n.test_status==='error'){
      const gated = this.model.blast(n.id);
      parts.push(html`<div class="block block-err"><div class="block-lbl" style="color:#f2555a">Failed test</div>
        <div style="font-size:11px;color:#c3c6cd">This model built successfully, but a data test on it failed${
          raw(gated ? ` and gates ${gated} downstream model(s)` : ` (nothing downstream depends on it)`)}.</div></div>`);
    }
    parts.push(this._cols(n));
    return html`${parts}`;
  }

  _tests(n){
    if(!n.tests || !n.tests.length) return '';
    return html`<div class="block" style="border:1px solid rgba(255,255,255,0.08)"><div class="block-lbl" style="color:#9aa0ab">Tests</div>${
      n.tests.map(t => {
        const b = t.status==='fail'||t.status==='error' ? 'b-fail' : t.status==='warn' ? 'b-warn' : 'b-pass';
        return html`<div class="tests-row"><span class="tname">${testLabel(t, n.name)}</span><span class="badge ${raw(b)}">${t.status}${raw(t.failures ? (' · '+t.failures) : '')}</span></div>`;
      })}</div>`;
  }

  _ask(n){
    const hasFailure = n.resource_type!=='source' && (n.status==='error'||n.test_status==='fail'||n.test_status==='error');
    if(!hasFailure) return '';
    return html`<div class="ask"><div class="ask-lbl">✦ Ask Claude · this node</div>
      <div class="ask-box"><input placeholder="Ask about this failure…" disabled><span style="color:#ff9d7a">↑</span></div></div>`;
  }

  _body(n){
    if(n.resource_type==='source') return this._source(n);
    const testFailed = (n.test_status==='fail'||n.test_status==='error');
    const isSuccess = n.status!=='error' && n.failure_class!=='casualty' && !testFailed;
    return html`${isSuccess ? this._success(n) : this._failure(n)}${this._tests(n)}`;
  }

  _html(n){
    const st = STATUS[badgeState(n)];
    const typeLabel = n.resource_type==='source' ? 'Source' : ('Model'+(n.materialization ? ' · '+n.materialization : ''));
    return html`<div class="d-head"><span class="badge b-lg ${raw(st.badge[1])}">${st.badge[0]}</span><span class="d-type">${typeLabel}</span><span class="x">×</span></div>
      <div class="d-title">${n.name}</div>${n.path ? html`<div class="d-path">${n.path}</div>` : ''}${this._body(n)}${this._ask(n)}`;
  }
}

class App {
  constructor(){
    this.model = new GraphModel(GRAPH);
    this.viewport = new Viewport(this.model);
    this.diagram = new Diagram(this.model, id => this.goTo(id));
    this.sidebar = new Sidebar(this.model, id => this.goTo(id));
    this.drawer = new Drawer(this.model, () => this.close());
    this._buildHeader();
    this._setupToolbar();
    this.viewport.apply();
    this._selectFirstFailure();
  }

  _open(id){
    this.diagram.highlight(id);
    this.drawer.select(this.model.byId[id]);
  }

  goTo(id){
    this.viewport.panToNode(id);
    this._open(id);
  }

  close(){
    this.drawer.close();
    this.diagram.clearHighlight();
  }

  _buildHeader(){
    const s = this.model.graph.summary;
    document.getElementById('hsub').textContent =
      (this.model.graph.command||'run')+' · '+s.models+' models · '+s.sources+' sources';

    const chips = [];
    const erroredCount = this.model.graph.nodes.filter(n => n.resource_type==='model' && n.status==='error').length;
    if(!this.model.isTestRun){
      if(erroredCount) chips.push([STATUS.failed.color, plural(erroredCount,'model')+' failed']);
      const cas = s.by_failure_class.casualty || 0;
      if(cas) chips.push([STATUS.skipped.color, plural(cas,'model')+' skipped']);
    }
    if(s.failing_tests) chips.push([STATUS.failed.color, plural(s.failing_tests,'test')+' failed']);
    if(s.stale_sources) chips.push([STATUS.stale.color, plural(s.stale_sources,'source')+' stale']);
    if(!chips.length) chips.push([STATUS.passed.color, 'all passed']);
    setHTML(document.getElementById('chips'),
      html`${chips.map(c => html`<span class="chip"><span class="dot" style="background:${raw(c[0])}"></span><span style="color:${raw(c[0])}">${c[1]}</span></span>`)}`);

    const legend = this.model.isTestRun
      ? [
          [STATUS.passed.color, 'test passed'],
          [STATUS.failed.color, 'test failed'],
          [STATUS.warn.color, 'warning'],
        ]
      : [
          [STATUS.passed.color, 'model passed'],
          [STATUS.failed.color, 'model failed'],
          [STATUS.skipped.color, 'skipped'],
          [STATUS.warn.color, 'warning'],
        ];
    setHTML(document.getElementById('legend'),
      html`${legend.map(c => html`<span class="chip" style="font-size:10px"><span class="dot" style="background:${raw(c[0])}"></span><span>${c[1]}</span></span>`)}`);
  }

  _setupToolbar(){
    const pathBtn = document.getElementById('pathBtn');
    let pathOn = false;
    pathBtn.onclick = () => {
      pathOn = !pathOn;
      pathBtn.classList.toggle('on', pathOn);
      pathBtn.innerHTML = (pathOn ? '◉' : '◯')+' Failure paths only';
      this.diagram.setPathOnly(pathOn);
    };

    const focusTargets = this.model.isTestRun
      ? this.model.graph.nodes.filter(n => n.test_status==='fail'||n.test_status==='error').map(n => n.id)
      : this.model.rootCauses;
    let focusI = 0;
    document.getElementById('focusIdx').textContent = focusTargets.length ? ('1 / '+focusTargets.length) : '0';
    document.getElementById('focusBtn').onclick = () => {
      if(!focusTargets.length) return;
      focusI = (focusI+1) % focusTargets.length;
      document.getElementById('focusIdx').textContent = (focusI+1)+' / '+focusTargets.length;
      this.goTo(focusTargets[focusI]);
    };
  }

  _selectFirstFailure(){
    const g = this.model.graph;
    const first = g.nodes.find(n => n.status==='error')
      || g.nodes.find(n => n.test_status==='fail'||n.test_status==='error')
      || g.nodes.find(n => n.resource_type==='source' && (n.freshness_status==='warn'||n.freshness_status==='error'));
    if(first) this._open(first.id);
  }
}

new App();

})();
</script>
